<!DOCTYPE html>
<html>
<head>
  <title>Hopequip Admin</title>
</head>
<body>
  <h2>Enquiries</h2>
  <table border="1" cellpadding="10">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Service</th>
        <th>Location</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

<script>
async function loadData() {
  const res = await fetch("http://localhost:5000/enquiries");
  const data = await res.json();

  const table = document.getElementById("data");

  data.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>${e.name}</td>
        <td>${e.phone}</td>
        <td>${e.service}</td>
        <td>${e.location}</td>
        <td>${new Date(e.created_at).toLocaleString()}</td>
      </tr>
    `;
  });
}

loadData();
</script>
</body>
</html>
